name: Yad2 Real Estate Agent

on:
  schedule:
    - cron: '0 * * * *'   # каждый час (пока можно оставить)
  workflow_dispatch:       # возможность ручного запуска

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnostic - show Yad2Scraper methods
        run: |
          python -c "from yad2_scraper import Yad2Scraper; print('Methods:', [m for m in dir(Yad2Scraper) if not m.startswith('_')])"

      - name: Restore sent_ids cache
        id: cache
        uses: actions/cache@v4
        with:
          path: sent_ids.json
          key: sent-ids-${{ github.run_id }}
          restore-keys: |
            sent-ids-

      - name: Save sent_ids cache
        if: success()  # сохраняем только при успешном выполнении
        uses: actions/cache@v4
        with:
          path: sent_ids.json
          key: sent-ids-${{ github.run_id }}
