name: Yad2 Real Estate Agent

on:
  schedule:
    - cron: '0 * * * *' # Запуск в начале каждого часа
  workflow_dispatch: # Возможность ручного запуска

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Yad2 Agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Commit updated sent_ids (если есть изменения)
        run: |
          if [ -f sent_ids.json ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add sent_ids.json
            git diff --staged --quiet || (git commit -m "Update sent_ids" && git push)
          else
            echo "Файл sent_ids.json отсутствует, коммит не требуется"
          fi
