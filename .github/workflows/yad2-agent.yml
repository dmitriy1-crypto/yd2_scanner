name: Yad2 Real Estate Agent (diagnostic)

on:
  workflow_dispatch:

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show Yad2Scraper methods
        run: python -c "from yad2_scraper import Yad2Scraper; print('Methods:', [m for m in dir(Yad2Scraper) if not m.startswith('_')])"
